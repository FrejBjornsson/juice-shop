name: Legacy Security Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  scan-and-pr:
    runs-on: ubuntu-latest
    env:
      PR_BRANCH_PREFIX: legacy-fix/
      STAGING_BASE: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: npx @cyclonedx/cyclonedx-npm -o bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json

      - name: Dependency scan (npm audit)
        run: |
          chmod +x scripts/dependency_scan.sh
          ./scripts/dependency_scan.sh bom.json
      - name: Upload dependency scan results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan
          path: dependency-scan.json

      - name: SAST pattern scan (codemod dry-run)
        run: |
          chmod +x scripts/sast-scan.sh
          ./scripts/sast-scan.sh --dry
      - name: Upload sast hits
        uses: actions/upload-artifact@v4
        with:
          name: sast-hits
          path: hits.json

      - name: Create PR with codemod (if findings)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/create_pr_with_codemod.sh
          ./scripts/create_pr_with_codemod.sh
